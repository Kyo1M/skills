<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>[資料タイトル]</title>
<style>
  :root {
    /* continova v1 color tokens */
    --brand-klein: #002FA7;
    --brand-blue: #1D6CFF;
    --brand-blue-soft: #EAF1FF;
    --ink: #111111;
    --stone: #2F3135;
    --pebble: #6F7175;
    --fog: #A9AAAD;
    --border: #B7B7B7;
    --border-soft: #DDDDDD;
    --snow: #F6F5F2;
    --white: #FFFFFF;
    --success: #10B981;
    --warning: #F59E0B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #E8E8E6;
    font-family: "Hiragino Sans", "Noto Sans JP", "Yu Gothic", system-ui, sans-serif;
    color: var(--ink);
    font-size: 16px;         /* 本文の既定。投影前提で 15-17px 帯。密度の高いスライドのみ 15px まで下げる */
    line-height: 1.6;
    padding: 40px 0;
    -webkit-font-smoothing: antialiased;
  }

  .deck {
    display: flex;
    flex-direction: column;
    gap: 32px;
    align-items: center;
  }

  /* Slide container — 16:9 fixed at 1672x941, scaled to viewport */
  .slide {
    width: 1672px;
    height: 941px;
    background: var(--white);
    position: relative;
    padding: 58px 70px 38px 70px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    transform-origin: top center;
    transform: scale(min(1, calc((100vw - 80px) / 1672px)));
    margin-bottom: calc((1 - min(1, calc((100vw - 80px) / 1672px))) * -941px);
  }

  @media (min-width: 1752px) {
    .slide { transform: none; margin-bottom: 0; }
  }

  /* Title block */
  .slide-eyebrow {
    font-size: 14px;
    letter-spacing: 0.18em;
    color: var(--pebble);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 14px;
  }
  .slide-title {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", serif;
    font-size: 46px;
    line-height: 1.25;
    color: var(--ink);
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .title-rule {
    width: 60px;
    height: 3px;
    background: var(--brand-klein);
    margin: 22px 0 22px 0;
  }
  .top-message {
    font-size: 26px;
    line-height: 1.55;
    color: var(--stone);
    font-weight: 500;
    max-width: 1400px;
    letter-spacing: 0.005em;
  }
  .top-message .accent { color: var(--brand-klein); font-weight: 700; }

  /* Body area */
  .body {
    margin-top: 36px;
    height: calc(100% - 270px);
    position: relative;
  }

  /* Footer */
  .footer {
    position: absolute;
    left: 70px;
    right: 70px;
    bottom: 22px;
    border-top: 1px solid var(--border-soft);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--pebble);
    letter-spacing: 0.05em;
  }
  .footer .left { font-weight: 500; }

  /* Section label utility */
  .label {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--pebble);
    font-weight: 600;
  }

  /* SVG common */
  .diagram { display: block; width: 100%; height: auto; }
  text { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; }

  /* 線アイコン（意味を補う用途）。詳細は references/design-system.md「線アイコンシステム」。
     アイコンは <defs> に <symbol id="ic-..." viewBox="0 0 24 24"> で定義し <use href="#ic-..."/> で参照。
     symbol の path には stroke/fill を付けず、下記 .ic から currentColor を継承させる。 */
  .ic { width:20px; height:20px; flex:none; fill:none; stroke:currentColor;
        stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; vertical-align:middle; }
  .ic-title { width:32px; height:32px; vertical-align:-5px; margin-right:13px; color:var(--brand-klein); }

  /* ======================================================== */
  /* スライドパターンごとの追加CSSは、slide-patterns.mdから        */
  /* 必要なものをここに追加していく                                  */
  /* ======================================================== */
</style>
</head>
<body>

<div class="deck">

<!-- 共通 SVG 定義: 矢印 marker と線アイコン symbol。詳細は references/design-system.md -->
<svg width="0" height="0" style="position:absolute;"><defs>
  <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon points="0 0, 8 4, 0 8" fill="#002FA7"/></marker>
  <!-- 線アイコン例（意味と 1:1 で必要分だけ追加。path には stroke/fill を付けず .ic から継承） -->
  <symbol id="ic-database" viewBox="0 0 24 24"><ellipse cx="12" cy="6" rx="7" ry="3"/><path d="M5 6 V18 c0 1.66 3.13 3 7 3 s7 -1.34 7 -3 V6"/><path d="M5 12 c0 1.66 3.13 3 7 3 s7 -1.34 7 -3"/></symbol>
  <symbol id="ic-chart" viewBox="0 0 24 24"><path d="M4 4 V20 H20"/><path d="M7 15 L11 10 L14 13 L19 6"/></symbol>
  <symbol id="ic-search" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6"/><path d="M14.8 14.8 L20 20"/></symbol>
</defs></svg>

<!-- ============================================================
SLIDE 1: [スライドタイトル]
============================================================ -->
<section class="slide" id="s1">
  <div class="slide-eyebrow">01 / SECTION_LABEL</div>
  <h1 class="slide-title">[スライドタイトル]</h1>
  <div class="title-rule"></div>
  <p class="top-message">
    [トップメッセージ。重要語句は]<span class="accent">accent</span>[で強調。1-2文に収める。]
  </p>

  <div class="body">
    <!-- 主役オブジェクトをここに配置                              -->
    <!-- パターンHTML/CSSは references/slide-patterns.md を参照     -->
    <p style="color: var(--pebble); font-size: 14px;">
      ※ 主役オブジェクト(チャート、図解、比較表、SVGダイアグラム等)を配置
    </p>
  </div>

  <div class="footer">
    <span class="left">[資料名] | [サブタイトル]</span>
    <span>01 / NN</span>
  </div>
</section>
